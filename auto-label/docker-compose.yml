version: '3.8'

services:
  vllm:
    image: vllmai/vllm-openai:latest
    container_name: vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - MODEL=${VLLM_MODEL:-huihui-ai/Huihui-Qwen3.5-2B-abliterated}
    ports:
      - "8000:8000"
    volumes:
      - vllm-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    command: >
      --model ${VLLM_MODEL:-huihui-ai/Huihui-Qwen3.5-2B-abliterated}
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --trust_remote_code

volumes:
  vllm-data: